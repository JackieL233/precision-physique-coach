name: Validate Skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check skill frontmatter
        run: python scripts/validate_skill.py skills/adaptive-bodybuilding-coach
      - name: Run completeness tests
        run: python -m unittest tests.test_skill_completeness tests.test_scripts_smoke
      - name: Run macro estimator smoke test
        run: |
          python skills/adaptive-bodybuilding-coach/scripts/estimate_targets.py --sex male --age 30 --height-cm 178 --weight-kg 80 --activity moderate --goal fat-loss
      - name: Run check-in analyzer smoke test
        run: |
          python skills/adaptive-bodybuilding-coach/scripts/analyze_checkin.py --goal fat-loss --weekly-change-pct -0.7 --adherence 0.9 --recovery good
      - name: Run training-volume analyzer smoke test
        run: |
          python skills/adaptive-bodybuilding-coach/scripts/analyze_training_volume.py --session-csv examples/sample-session-log.csv
